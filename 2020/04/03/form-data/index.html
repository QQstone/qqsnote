&apos;&apos;,</span><br><span class="line">    method: &apos;POST&apos;,</span><br><span class="line">    headers: formData.getHeaders(),</span><br><span class="line">    auth: authorizationData</span><br><span class="line">&#125;;</span><br><span class="line">const req = http.request(options, (res) =&gt; &#123;</span><br><span class="line">    res.setEncoding(&apos;utf8&apos;);</span><br><span class="line">    res.on(&apos;data&apos;, (chunk) =&gt; &#123;</span><br><span class="line">        console.log(`BODY: $&#123;chunk&#125;`);</span><br><span class="line">    &#125;);</span><br><span class="line">    res.on(&apos;end&apos;, () =&gt; &#123;</span><br><span class="line">        console.log(&apos;No more data in response.&apos;);</span><br><span class="line">    &#125;);</span><br><span class="line">&#125;);</span><br><span class="line">req.on(&apos;error&apos;, (e) =&gt; &#123;</span><br><span class="line">    console.error(`problem with request: $&#123;e.message&#125;`);</span><br><span class="line">&#125;);</span><br><span class="line">formData.pipe(req);</span><br></pre></td></tr></table></figure></p>
